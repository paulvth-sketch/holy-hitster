<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#2d1a1c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hit That Halleluja" />
  <title>Hit That Halleluja</title>

  <link rel="manifest" href="data:application/json,{
    %22name%22:%22Hit%20That%20Halleluja%22,
    %22short_name%22:%22Halleluja%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%232d1a1c%22,
    %22theme_color%22:%22%232d1a1c%22,
    %22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23DB7B65'/%3E%3Ctext y='.9em' font-size='80' x='10'%3E🎵%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]
  }" />

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --coral:      #DB7B65;   /* main */
      --amber:      #ECB865;   /* ondersteunend warm */
      --plum:       #695356;   /* ondersteunend donker */
      --teal:       #255F63;   /* ondersteunend koel */
      --blush:      #FBC9BE;   /* contrast / licht accent */
      --bg:         #2d1a1c;   /* donkere achtergrond afgeleid van plum */
      --bg-card:    #3a2224;
      --muted:      #9a7b7e;
      --white:      #FFF5F3;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px);
    }

    /* ── LOGO ── */
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 11vw, 66px);
      letter-spacing: 0.05em;
      line-height: 1;
      color: var(--white);
      text-align: center;
    }
    .logo span { color: var(--coral); }
    .logo .sub { color: var(--amber); }

    .tagline {
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 8px;
      text-align: center;
    }

    /* ── DECORATIVE CROSS ── */
    .deco-cross {
      width: 32px;
      height: 32px;
      position: relative;
      margin: 20px auto;
      opacity: 0.4;
    }
    .deco-cross::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: var(--coral);
      transform: translateY(-50%);
    }
    .deco-cross::after {
      content: '';
      position: absolute;
      left: 50%; top: 0; bottom: 0;
      width: 1px;
      background: var(--coral);
      transform: translateX(-50%);
    }

    /* ── BUTTON ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--coral);
      color: var(--white);
      border: none;
      border-radius: 3px;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 16px 32px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.97); }
    .btn:hover  { background: #e88b76; }

    /* ── LOGIN SCREEN ── */
    #screen-login {
      background: radial-gradient(ellipse at 50% 0%, #4a2228 0%, var(--bg) 65%);
    }
    #screen-login .logo { margin-bottom: 4px; }
    #screen-login .desc {
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      max-width: 260px;
      line-height: 1.8;
      margin: 4px 0 36px;
    }

    /* ── SCANNER SCREEN ── */
    #screen-scan { padding: 0; }
    #video-container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    #camera-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .viewfinder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    /* dark vignette around viewfinder */
    .viewfinder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 55% 55% at 50% 50%, transparent 30%, rgba(45,26,28,0.75) 100%);
    }
    .vf-frame {
      width: min(240px, 68vw);
      height: min(240px, 68vw);
      position: relative;
      z-index: 1;
    }
    .vf-frame::before,
    .vf-frame::after,
    .vf-corner-br,
    .vf-corner-bl {
      content: '';
      position: absolute;
      width: 30px;
      height: 30px;
      border-color: var(--coral);
      border-style: solid;
    }
    .vf-frame::before  { top: 0;    left: 0;  border-width: 2px 0 0 2px; }
    .vf-frame::after   { top: 0;    right: 0; border-width: 2px 2px 0 0; }
    .vf-corner-br      { bottom: 0; right: 0; border-width: 0 2px 2px 0; }
    .vf-corner-bl      { bottom: 0; left: 0;  border-width: 0 0 2px 2px; }

    .scan-line {
      position: absolute;
      left: 4px; right: 4px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--coral), transparent);
      animation: scanline 2s ease-in-out infinite;
      top: 50%;
    }
    @keyframes scanline {
      0%   { transform: translateY(-110px); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(110px);  opacity: 0; }
    }
    .vf-label {
      margin-top: 28px;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(251,201,190,0.6);
      z-index: 1;
    }

    /* Top bar in scanner */
    .scan-topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 52px 20px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(45,26,28,0.9), transparent);
      pointer-events: all;
      z-index: 2;
    }
    .scan-topbar .logo-sm {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      letter-spacing: 0.05em;
      color: var(--white);
      line-height: 1;
    }
    .scan-topbar .logo-sm span { color: var(--coral); }
    .scan-topbar .logo-sm .sub { color: var(--amber); }
    .btn-logout {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── PLAYING SCREEN ── */
    #screen-playing {
      background: radial-gradient(ellipse at 50% 40%, #3d2020 0%, var(--bg) 70%);
    }

    /* Vinyl disc */
    .vinyl {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 50%, var(--plum) 0%, var(--plum) 14%, transparent 14.5%),
        repeating-radial-gradient(circle at 50% 50%,
          #2a1618 0px, #2a1618 3px,
          #321c1e 3px, #321c1e 6px);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 44px;
      animation: spin 4s linear infinite;
      animation-play-state: running;
      box-shadow: 0 0 0 1px var(--plum), 0 8px 32px rgba(0,0,0,0.5);
    }
    .vinyl.paused { animation-play-state: paused; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .vinyl-center {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--coral);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--white);
      z-index: 1;
      position: relative;
    }
    /* pulse rings */
    .vinyl::before, .vinyl::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid var(--coral);
      opacity: 0;
      animation: vpulse 2.8s ease-out infinite;
    }
    .vinyl::after { animation-delay: 1.4s; }
    @keyframes vpulse {
      0%   { transform: scale(1);   opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .playing-label {
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--coral);
      margin-bottom: 10px;
    }
    .playing-mystery {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 44px;
      letter-spacing: 0.12em;
      color: var(--blush);
      margin-bottom: 6px;
      text-align: center;
    }
    .playing-sub {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 44px;
    }

    /* controls */
    .controls {
      display: flex;
      gap: 14px;
      align-items: center;
    }
    .ctrl-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      background: var(--bg-card);
      color: var(--blush);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      border: 1px solid var(--plum);
    }
    .ctrl-btn:active { transform: scale(0.92); }
    .ctrl-btn:hover  { background: var(--plum); }
    .ctrl-btn.play {
      width: 66px;
      height: 66px;
      background: var(--coral);
      color: var(--white);
      font-size: 24px;
      border: none;
    }
    .ctrl-btn.play:hover { background: #e88b76; }

    .scan-next {
      margin-top: 28px;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      padding: 10px;
    }
    .scan-next:hover { color: var(--blush); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--bg-card);
      border: 1px solid var(--plum);
      color: var(--blush);
      font-size: 12px;
      letter-spacing: 0.05em;
      padding: 12px 20px;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ══ LOGIN ══ -->
<div class="screen" id="screen-login">
  <div class="logo">Hit That<br><span>Halle</span><span class="sub">luja</span></div>
  <div class="tagline">Scan. Speel. Raad.</div>
  <div class="deco-cross"></div>
  <p class="desc">Log in met Spotify Premium. Scan een QR-code. De muziek speelt — maar welk nummer is het?</p>
  <button class="btn" id="btn-login">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
    </svg>
    Inloggen met Spotify
  </button>
</div>

<!-- ══ SCANNER ══ -->
<div class="screen hidden" id="screen-scan">
  <div id="video-container">
    <video id="camera-video" playsinline autoplay muted></video>
    <canvas id="qr-canvas" style="display:none;"></canvas>
    <div class="scan-topbar">
      <div class="logo-sm">Hit That <span>Halle</span><span class="sub">luja</span></div>
      <button class="btn-logout" id="btn-logout">Uitloggen</button>
    </div>
    <div class="viewfinder">
      <div class="vf-frame">
        <div class="vf-corner-br"></div>
        <div class="vf-corner-bl"></div>
        <div class="scan-line"></div>
      </div>
      <div class="vf-label">Richt op een QR-code</div>
    </div>
  </div>
</div>

<!-- ══ PLAYING ══ -->
<div class="screen hidden" id="screen-playing">
  <div class="vinyl" id="vinyl-disc">
    <div class="vinyl-center">♪</div>
  </div>
  <div class="playing-label">Nu aan het spelen</div>
  <div class="playing-mystery">???</div>
  <div class="playing-sub">Welk nummer is dit?</div>
  <div class="controls">
    <button class="ctrl-btn" id="btn-prev">⏮</button>
    <button class="ctrl-btn play" id="btn-playpause">⏸</button>
    <button class="ctrl-btn" id="btn-next">⏭</button>
  </div>
  <button class="scan-next" id="btn-scan-next">↩ Scan een nieuw nummer</button>
</div>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
<script>
// ── CONFIG ──
const CONFIG = {
  CLIENT_ID:    '3a914be7f0984a1d8d0f9dd2c18dceff',
  REDIRECT_URI: window.location.href.split('?')[0].split('#')[0],
  SCOPES: [
    'streaming','user-read-email','user-read-private',
    'user-modify-playback-state','user-read-playback-state'
  ].join(' ')
};

// ── UTILITY ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3500);
}

// ── AUTH (PKCE) ──
function generateRandom(len) {
  return Array.from(crypto.getRandomValues(new Uint8Array(len)))
    .map(b => b.toString(16).padStart(2,'0')).join('').slice(0, len);
}
async function sha256(plain) {
  return crypto.subtle.digest('SHA-256', new TextEncoder().encode(plain));
}
function base64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
async function startLogin() {
  const verifier  = generateRandom(64);
  const challenge = base64url(await sha256(verifier));
  sessionStorage.setItem('pkce_verifier', verifier);
  const params = new URLSearchParams({
    client_id: CONFIG.CLIENT_ID, response_type: 'code',
    redirect_uri: CONFIG.REDIRECT_URI,
    code_challenge_method: 'S256', code_challenge: challenge,
    scope: CONFIG.SCOPES
  });
  window.location = 'https://accounts.spotify.com/authorize?' + params;
}
async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: CONFIG.CLIENT_ID, grant_type: 'authorization_code',
      code, redirect_uri: CONFIG.REDIRECT_URI, code_verifier: verifier
    })
  });
  const data = await res.json();
  if (data.access_token) {
    localStorage.setItem('spotify_token',   data.access_token);
    localStorage.setItem('spotify_refresh', data.refresh_token);
    localStorage.setItem('spotify_expiry',  Date.now() + data.expires_in * 1000);
    window.history.replaceState({}, '', window.location.pathname);
    return data.access_token;
  }
  throw new Error('Token exchange mislukt');
}
async function getToken() {
  const expiry = parseInt(localStorage.getItem('spotify_expiry') || '0');
  if (Date.now() < expiry - 30000) return localStorage.getItem('spotify_token');
  const refresh = localStorage.getItem('spotify_refresh');
  if (!refresh) return null;
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: CONFIG.CLIENT_ID, grant_type: 'refresh_token', refresh_token: refresh
    })
  });
  const data = await res.json();
  if (data.access_token) {
    localStorage.setItem('spotify_token',  data.access_token);
    localStorage.setItem('spotify_expiry', Date.now() + data.expires_in * 1000);
    if (data.refresh_token) localStorage.setItem('spotify_refresh', data.refresh_token);
    return data.access_token;
  }
  return null;
}
function logout() {
  localStorage.removeItem('spotify_token');
  localStorage.removeItem('spotify_refresh');
  localStorage.removeItem('spotify_expiry');
  stopCamera();
  showScreen('screen-login');
}

// ── PLAYER ──
let player = null, deviceId = null, isPlaying = false;
window.onSpotifyWebPlaybackSDKReady = () => {};

async function initPlayer(token) {
  if (player) return;
  player = new Spotify.Player({
    name: 'Hit That Halleluja',
    getOAuthToken: cb => cb(token),
    volume: 0.8
  });
  player.addListener('ready', ({ device_id }) => { deviceId = device_id; });
  player.addListener('not_ready', () => { deviceId = null; });
  player.addListener('player_state_changed', state => {
    if (!state) return;
    isPlaying = !state.paused;
    document.getElementById('btn-playpause').textContent = isPlaying ? '⏸' : '▶';
    const vinyl = document.getElementById('vinyl-disc');
    if (isPlaying) vinyl.classList.remove('paused');
    else           vinyl.classList.add('paused');
  });
  player.addListener('account_error', () => showToast('Spotify Premium vereist'));
  player.addListener('initialization_error', ({ message }) => showToast('Fout: ' + message));
  player.addListener('authentication_error', () => showToast('Authenticatie mislukt'));
  await player.connect();
}

async function playTrack(uri) {
  const token = await getToken();
  if (!token || !deviceId) { showToast('Speler niet gereed — wacht even en probeer opnieuw'); return; }
  await fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
    body: JSON.stringify({ uris: [uri] })
  });
  isPlaying = true;
  document.getElementById('btn-playpause').textContent = '⏸';
  document.getElementById('vinyl-disc').classList.remove('paused');
  showScreen('screen-playing');
}

// ── QR SCANNER ──
let videoStream = null, scanInterval = null, lastScanned = '';

async function startCamera() {
  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    const video = document.getElementById('camera-video');
    video.srcObject = videoStream;
    await video.play();
    scanInterval = setInterval(scanFrame, 300);
  } catch(e) { showToast('Camera toegang geweigerd'); }
}
function stopCamera() {
  clearInterval(scanInterval);
  if (videoStream) { videoStream.getTracks().forEach(t => t.stop()); videoStream = null; }
}
function scanFrame() {
  const video = document.getElementById('camera-video');
  const canvas = document.getElementById('qr-canvas');
  if (video.readyState !== video.HAVE_ENOUGH_DATA) return;
  canvas.width = video.videoWidth; canvas.height = video.videoHeight;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0);
  const code = jsQR(ctx.getImageData(0, 0, canvas.width, canvas.height).data, canvas.width, canvas.height, { inversionAttempts: 'dontInvert' });
  if (code && code.data !== lastScanned) { lastScanned = code.data; handleQR(code.data); }
}
function handleQR(raw) {
  let uri = null;
  if (raw.startsWith('spotify:track:')) { uri = raw; }
  else {
    const m = raw.match(/open\.spotify\.com\/track\/([A-Za-z0-9]+)/);
    if (m) uri = 'spotify:track:' + m[1];
  }
  if (uri) { stopCamera(); playTrack(uri); }
  else { showToast('Geen geldige QR-code'); setTimeout(() => { lastScanned = ''; }, 2000); }
}

// ── EVENTS ──
document.getElementById('btn-login').addEventListener('click', startLogin);
document.getElementById('btn-logout').addEventListener('click', logout);
document.getElementById('btn-playpause').addEventListener('click', async () => { if (player) await player.togglePlay(); });
document.getElementById('btn-prev').addEventListener('click', async () => { if (player) await player.previousTrack(); });
document.getElementById('btn-next').addEventListener('click', async () => { if (player) await player.nextTrack(); });
document.getElementById('btn-scan-next').addEventListener('click', () => {
  lastScanned = '';
  showScreen('screen-scan');
  startCamera();
});

// ── BOOT ──
async function boot() {
  const urlParams = new URLSearchParams(window.location.search);
  const code = urlParams.get('code');
  if (code) {
    try {
      const token = await exchangeCode(code);
      await initPlayer(token);
      showScreen('screen-scan');
      startCamera();
      return;
    } catch(e) { showToast('Inloggen mislukt — probeer opnieuw'); }
  }
  const token = await getToken();
  if (token) {
    await initPlayer(token);
    showScreen('screen-scan');
    startCamera();
  } else {
    showScreen('screen-login');
  }
}
boot();
</script>
